<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1a35" />
  <title>Sign up — Boostly</title>
  <link rel="stylesheet" href="css/shared.css" />
</head>
<body>
  <div class="auth-page">
    <div class="container">
      <a href="signin.html" class="auth-logo">
        <div class="auth-logo__mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#080f1f" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="auth-logo__name">Boost<span>ly</span></span>
      </a>

      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-card__sub">Sign up to create captions, flyers &amp; promo videos.</p>

        <div class="auth-error" id="auth-error" role="alert"></div>

        <form id="form-signup" action="index.html" method="get" novalidate>
          <div class="auth-field">
            <label for="input-name">Full name *</label>
            <input id="input-name" type="text" placeholder="Ada Okonkwo" autocomplete="name" required />
          </div>
          <div class="auth-field">
            <label for="input-business">Business name</label>
            <input id="input-business" type="text" placeholder="e.g. Mama Titi Kitchen" autocomplete="organization" />
          </div>
          <div class="auth-field">
            <label for="input-email">Email *</label>
            <input id="input-email" type="email" placeholder="you@business.com" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label for="input-password">Password * (min 6 characters)</label>
            <input id="input-password" type="password" placeholder="Your password" autocomplete="new-password" required minlength="6" />
          </div>
          <button type="submit" class="auth-btn" id="btn-signup">Create account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="signin.html">Sign in</a></p>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
